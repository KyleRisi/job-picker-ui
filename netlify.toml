[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[[redirects]]
  from = "https://compendium-circus-hr.netlify.app/*"
  to = "https://www.thecompendiumpodcast.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://jobpicker.thecompendiumpodcast.com/*"
  to = "/:splat"
  status = 410
  force = true

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, immutable"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    "Cache-Control" = "public, max-age=300"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    "Cache-Control" = "public, max-age=300"

[[headers]]
  for = "/*"
  [headers.values]
    "Cache-Control" = "public, max-age=0, must-revalidate"
    "X-Content-Type-Options" = "nosniff"
    "Referrer-Policy" = "strict-origin-when-cross-origin"
    "X-Frame-Options" = "DENY"
    "Permissions-Policy" = "camera=(), microphone=(), geolocation=()"
    "Content-Security-Policy-Report-Only" = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests"

[dev]
  command = "npm run dev"
  framework = "next"
  targetPort = 3000
  port = 3000
